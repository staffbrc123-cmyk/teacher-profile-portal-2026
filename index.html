<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Profile Portal 2026</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">
<img src="assets/logo.png" alt="Logo">
</div>

<div class="title">

<h1>Teacher Profile Portal 2026</h1>

<h3>Basic Education Department</h3>

<p>Online Teacher Information Collection System</p>

</div>

</header>

<div class="container">

<form id="teacherForm">

<div class="card">

<h2>Teacher Information</h2>

<div class="row">

<div class="inputBox">
<label>Manav Sampada Code</label>
<input type="number" id="code" required>
</div>

<div class="inputBox">
<label>Teacher Name</label>
<input type="text" id="name" required>
</div>

</div>

<div class="row">

<div class="inputBox">
<label>School Name</label>

<select id="school">
<option value="">Select School</option>
</select>

</div>

<div class="inputBox">
<label>Gender</label>

<select id="gender">

<option>Male</option>

<option>Female</option>

</select>

</div>

</div>

<div class="row">

<div class="inputBox">

<label>Category</label>

<select id="category">

<option>General</option>

<option>OBC</option>

<option>SC</option>

<option>ST</option>

</select>

</div>

<div class="inputBox">

<label>Divyang</label>

<select id="divyang">

<option>No</option>

<option>Yes</option>

</select>

</div>

</div>

<div class="row">

<div class="inputBox">

<label>Phone Number</label>

<input type="tel" id="phone">

</div>

<div class="inputBox">

<label>WhatsApp Number</label>

<input type="tel" id="whatsapp">

</div>

</div>

<div class="row">

<div class="inputBox">

<label>Date of Birth</label>

<input type="date" id="dob">

</div>

<div class="inputBox">

<label>Email</label>

<input type="email" id="email">

</div>

</div>

<div class="row">

<div class="inputBox">

<label>Subject</label>

<select id="subject">

<option>Select Subject</option>

</select>

</div>

<div class="inputBox">

<label>Address</label>

<textarea id="address"></textarea>

</div>

</div>

<button type="submit">

Submit Teacher Profile

</button>

</div>

</form>

</div>

<script src="schools.js"></script>
<script src="subjects.js"></script>
<script src="script.js"></script>

</body>

</html>
